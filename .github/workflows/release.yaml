name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x86_64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            binary: wassel-cli.exe
            asset: wassel-cli-x86_64-pc-windows-msvc.exe

          - name: Windows ARM64
            runner: windows-11-arm
            target: aarch64-pc-windows-msvc
            binary: wassel-cli.exe
            asset: wassel-cli-aarch64-pc-windows-msvc.exe

          - name: Ubuntu 24.04 x86_64
            runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            binary: wassel-cli
            asset: wassel-cli-x86_64-unknown-linux-gnu

          - name: Ubuntu 24.04 ARM64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            binary: wassel-cli
            asset: wassel-cli-aarch64-unknown-linux-gnu

          - name: macOS ARM64
            runner: macos-latest
            target: aarch64-apple-darwin
            binary: wassel-cli
            asset: wassel-cli-aarch64-apple-darwin

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        run: |
          rustup update stable
          rustup target add ${{ matrix.target }}
          rustup component add clippy

      - name: Cache Cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Run Clippy
        run: cargo clippy --target ${{ matrix.target }} -- -D warnings

      - name: Run tests
        run: cargo test --target ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} --package wassel-cli

      - name: Rename binary for upload
        shell: bash
        run: cp target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.asset }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Extract changelog for this version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          BODY=$(awk \
            "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" \
            CHANGELOG.md)

          if [ -z "$BODY" ]; then
            echo "ERROR: No changelog entry found for version ${VERSION}" >&2
            exit 1
          fi

          echo "$BODY" > release_notes.md

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          body_path: release_notes.md
          files: artifacts/*
          fail_on_unmatched_files: true
